spring.application.name=Sale_Savvy

spring.datasource.url=jdbc:mysql://localhost:3306/salessavvy

spring.datasource.username=root

spring.datasource.password=your_password_here

spring.jpa.hibernate.ddl-auto=update
spring.security.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
jwt.secret=YOUR_JWT_SECRET
jwt.expiration=3600000
#spring.jpa.hibernate.ddl-auto=validate

# Enable CORS for specific endpoints
spring.web.cors.allowed-origin-patterns=http://localhost:5174
spring.web.cors.exposed-headers=*
spring.web.cors.max-age=36000
spring.web.cors.allowed-origins=http://localhost:5174
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Content-Type,Authorization
spring.web.cors.allow-credentials=true

logging.level.root=INFO
logging.level.org.springframework.web=INFO


razorpay.key.id=YOUR_RAZORPAY_KEY_ID

razorpay.key.secret=YOUR_RAZORPAY_KEY_SECRET
